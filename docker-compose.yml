version: "4.7"

services:
  app:
    build: .
    ports:
      - "8090:8080"
    networks:
      - mercado-network
    env_file:
      - .env

  postgres:
    image: postgres:latest
    env_file:
      - .env

    ports:
      - "5433:5432"
    networks:
      - mercado-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    env_file:
      - .env

networks:
  mercado-network:
    driver: bridge


volumes:
  postgres-data:
